<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUD K51</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styleindex.css">
</head>

<body>

<div class="topbar">
  <span class="menu-btn" onclick="toggleSidebar()">☰</span>
  TRƯỜNG ĐẠI HỌC SƯ PHẠM THÀNH PHỐ HỒ CHÍ MINH
</div>


<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
      <h3>Nền tảng</h3>
<a class="active" onclick="showTab('nentang',this)">HCMUE</a>
<a onclick="showTab('ungdung',this)">Cá nhân</a>
    <h3>Thời khóa biểu</h3>
    <a onclick="showTab('hk2',this)">TUD K51</a>
  </div>

  <!-- MAIN -->
  <div class="main">

<div id="nentang" class="content active">
    <div class="platform-grid">
        </div>
</div>

<div id="ungdung" class="content">
    <div class="platform-grid">
        </div>
</div>
<!-- TAB THỜI KHÓA BIỂU (Đã sửa lỗi hiển thị đè) -->
        <div id="hk2" class="content">
<div class="card">
    <div class="card-header">Thời khóa biểu TUD K51</div>
    
    <div class="form-row-custom">
        <div class="input-group">
            <label>Năm học</label>
            <select id="selectNamHoc" onchange="updateHocKy()">
                 <option value="">-- Chọn năm học --</option>
<option value="2025-2026">2025 - 2026</option>
<option value="2026-2027">2026 - 2027</option>
<option value="2027-2028">2027 - 2028</option>
<option value="2028-2029">2028 - 2029</option>
<option value="2029-2030">2029 - 2030</option>
<option value="2030-2031">2030 - 2031</option>

            </select>
        </div>

        <div class="input-group">
            <label>Học kỳ</label>
            <select id="selectHocKy" onchange="updateTuan()">
                <option value="" selected>-- Chọn học kỳ --</option>
                <option value="Nam1HK1TUD">Học kỳ 1</option>
                <option value="Nam1HK2TUD">Học kỳ 2</option>
		<option value="Nam1HK3TUD">Học kỳ 3 (Hè)</option>
            </select>
        </div>

        <div class="input-group" style="flex: 1.5;">
            <label>Tuần</label>
            <select id="selectTuan" onchange="displayIframe()">
                <option value="">-- Chọn tuần --</option>
            </select>
        </div>

        <div class="button-group">
            <div class="nav-btns">
                <button class="btn-nav" onclick="navTuan(-1)">⏮</button>
                <button class="btn-nav" onclick="navTuan(1)">⏭</button>

            </div>
            
            <button class="btn-blue" onclick="goToday()">
    <span>📅</span> Hiện tại
</button>
<button class="btn-blue" onclick="viewFullTKB()">
            <span>👁</span> TKB Tổng hợp
        </button>
        </div>
    </div>


    <div id="boxTKB" class="iframe-box">
        <iframe id="iframeTKB"></iframe>
    </div>
</div>
        </div>
    </div>
</div>
<div id="modalTongHop" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span>XEM THỜI KHÓA BIỂU TỔNG HỢP</span>
            <span class="close-modal" onclick="closeModal()">×</span>
        </div>
        <div class="modal-body">
            <iframe id="iframeTongHop" src=""></iframe>
        </div>
        <div style="padding: 10px 20px; border-top: 1px solid #eee; text-align: right;">
            <button class="btn-blue" style="padding: 8px 15px; font-size: 13px;" onclick="closeModal()">
                Đóng
            </button>
        </div>
    </div>
</div>
<script src="nentang.js"></script>
<script src="ungdung.js"></script>
<script src="datatkbindex.js"></script>
<script src="scriptindex.js"></script>
</body>
</html>
